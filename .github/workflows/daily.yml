name: Daily prices fetch

on:
  schedule:
    # 每个工作日 UTC 14/15/16 各跑一次（北京 22/23/次日0点）= 多个错峰入口，防止 GitHub 丢调度。
    # 写入按日期合并、幂等，一天多跑几次只覆盖同一行，不会重复。
    - cron: '0 14,15,16 * * 1-5'
  workflow_dispatch:  # 允许在 GitHub 网页手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: python fetch_prices.py
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
